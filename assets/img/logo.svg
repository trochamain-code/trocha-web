  <circle cx="100" cy="100" r="82" stroke="#C4A000" stroke-width="1.5" opacity="0.5"/>
  <!-- Crosshair / surveillance reticle -->
  <line x1="100" y1="12" x2="100" y2="40" stroke="#C4A000" stroke-width="2" opacity="0.7"/>
  <line x1="100" y1="160" x2="100" y2="188" stroke="#C4A000" stroke-width="2" opacity="0.7"/>
  <line x1="12" y1="100" x2="40" y2="100" stroke="#C4A000" stroke-width="2" opacity="0.7"/>
  <line x1="160" y1="100" x2="188" y2="100" stroke="#C4A000" stroke-width="2" opacity="0.7"/>
